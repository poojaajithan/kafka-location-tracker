spring.application.name=deliverydriverapp

spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
# Enables Kafka producer transactions. Spring Kafka appends a counter to this prefix
# to create a unique transactional.id per producer instance.
spring.kafka.producer.transaction-id-prefix=driver-tx-

# Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
logging.pattern.level=%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]
spring.kafka.template.observation-enabled=true
