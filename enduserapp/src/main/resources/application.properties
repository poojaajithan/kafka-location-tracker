spring.application.name=enduserapp
server.port=8081

spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
# Assigns a unique transaction ID prefix. Spring Kafka appends a counter to make each
# producer instance uniquely identifiable. Required to enable Kafka producer transactions.
spring.kafka.producer.transaction-id-prefix=enduser-tx-

spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=location-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.enduser.enduserapp.models.LocationUpdateRequest
spring.kafka.consumer.properties.spring.json.use.type.headers=false
# Only read messages that have been fully committed by their producer transaction.
# Without this, the consumer may see messages from transactions that later aborted,
# which would cause processing of data that was never "officially" produced.
spring.kafka.consumer.properties.isolation.level=read_committed

# Database (H2 in-memory for demonstration)
spring.datasource.url=jdbc:h2:mem:locationdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
logging.pattern.level=%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]
spring.kafka.listener.observation-enabled=true
